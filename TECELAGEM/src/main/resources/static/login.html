<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login - Tecelagem</title>

<link rel="stylesheet"
href="/css/estilo.css">

</head>

<body>

<div class="topo">

<img
src="/logo.png"
class="logo-topo"
alt="Logo">

<span class="nome-empresa">
Margareth Tech
</span>

</div>

<div class="login-container">

<div class="login-box">

<h2>Bem-vindo</h2>

<p class="subtitle">
Entre para continuar
</p>

<form id="formLogin">

<input
type="text"
id="usuario"
placeholder="Usuário"
required>

<input
type="password"
id="senha"
placeholder="Senha"
required>

<button type="submit">

Entrar

</button>

</form>

<p id="mensagem"></p>

</div>

</div>

<script>

document
.getElementById("formLogin")
.addEventListener(
"submit",

async function(e){

e.preventDefault();

const usuario =
document
.getElementById(
"usuario")
.value;

const senha =
document
.getElementById(
"senha")
.value;

const resposta =
await fetch(
"/auth/login",
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

usuario:usuario,
senha:senha

})

});

const dados =
await resposta.json();

const msg =
document
.getElementById(
"mensagem"
);

if(dados.ok){

sessionStorage.setItem("usuarioLogado", dados.usuario);

msg.style.color =
"green";

msg.innerText =
"Login realizado";

setTimeout(()=>{

window.location.href=
"/admin.html";

},1000);

}
else{

msg.style.color=
"red";

msg.innerText=
dados.mensagem;

}

});

</script>

</body>
</html>
